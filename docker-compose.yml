version: "3.8"

# ══════════════════════════════════════════════════════════════════════════════
# Unified stack: CUPS AirPrint bridge + email2Print
# ══════════════════════════════════════════════════════════════════════════════
#
# FIRST-TIME SETUP for CUPS config volume:
#   If /your/path/cups-config/ is empty, start CUPS without the volume first
#   so it can generate its default config files, then stop it, copy the
#   generated files into the host directory, and restart with the volume.
#
#     docker run --rm --name cups-init \
#       drpsychick/airprint-bridge:latest sleep 5
#     docker cp cups-init:/etc/cups/. /your/path/cups-config/
#
#   After that, docker-compose up works normally.
#
# Tip: store secrets in a .env file next to this file and reference them
# with ${VAR_NAME} syntax. Add .env to your .gitignore!
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────────────────────────────────────
  # CUPS / AirPrint bridge
  # network_mode: host is required for USB printer access and mDNS (Avahi).
  # CUPS web interface: http://<host-ip>:631
  # ────────────────────────────────────────────────────────────────────────────
  cups:
    image: drpsychick/airprint-bridge:latest
    container_name: cups
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - CUPS_WEBINTERFACE=yes
      - CUPS_REMOTE_ADMIN=yes
      - CUPS_ADMIN_USER=admin
      - CUPS_ADMIN_PASSWORD=changeme
    volumes:
      # Mount the full CUPS config directory.
      # The host directory MUST already contain valid CUPS config files
      # (especially cups-files.conf). See FIRST-TIME SETUP note above.
      - /your/path/cups-config:/etc/cups
      # Mount Avahi service file(s) for AirPrint discovery.
      # Adjust the filename to match your printer.
      - /your/path/avahi:/etc/avahi/services
      - /var/run/dbus:/var/run/dbus

  # ────────────────────────────────────────────────────────────────────────────
  # email2Print
  # network_mode: host shares the host network stack with the CUPS container,
  # so lp/lpstat connect to localhost:631 directly without any IPP version
  # negotiation errors.
  # WebUI is available at http://<host-ip>:635
  # ────────────────────────────────────────────────────────────────────────────
  email2print:
    build:
      context: ./email2Print
    container_name: email2print
    restart: unless-stopped
    network_mode: host
    environment:
      # ── Printer ────────────────────────────────────────────────────────────
      # Must match the CUPS queue name exactly (case-sensitive).
      # Verify with:  docker exec email2print lpstat -p
      - PRINTER_NAME=Your-Printer-Queue-Name

      # ── IMAP (incoming mail) ─────────────────────────────────────────────
      - IMAP_SERVER=imap.example.com
      - IMAP_PORT=993
      - EMAIL_ACCOUNT=print@example.com
      - EMAIL_PASSWORD=your-imap-password

      # ── SMTP (outgoing confirmations) ─────────────────────────────────────
      - SMTP_SERVER=smtp.example.com
      - SMTP_PORT=587
      - SMTP_USERNAME=print@example.com
      - SMTP_PASSWORD=your-smtp-password
      - FROM_ADDRESS=print@example.com
      - CONFIRM_SUBJECT=Your print job has been processed

      # ── Behaviour ──────────────────────────────────────────────────────────
      - SLEEP_TIME=60
      - ALLOWED_ATTACHMENT_TYPES=pdf,docx,png,jpg
      # Comma-separated allowed sender addresses; leave empty to allow all
      - ALLOWED_RECIPIENTS=user1@example.com,user2@example.com
      - CONFIRM_TEMPLATE=default.html

      # ── Admin alert (optional) ────────────────────────────────────────────
      # If set, receives a detailed error report on every failed print job.
      - ADMIN_EMAIL=admin@example.com

      # ── WebUI (optional) ──────────────────────────────────────────────────
      # Set to 'false' to disable the web interface entirely.
      # With network_mode: host the WebUI is accessible on port 635 of the host.
      - WEBUI_ENABLED=true

    volumes:
      - ./email2Print/templates:/app/templates
      - ./email2Print/data:/app/data
      - ./email2Print/logs:/app/logs

    depends_on:
      - cups
