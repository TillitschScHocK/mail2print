version: "3.8"

# ══════════════════════════════════════════════════════════════════════════════
# Stack: CUPS + Avahi (AirPrint) + mail2print
#
# Verzeichnisstruktur (wird automatisch angelegt):
#   ./cups/        – CUPS-Konfiguration (/etc/cups)
#   ./avahi/       – Avahi-Service-Dateien (/etc/avahi/services)
#   ./mail2print/  – Daten, Logs und Templates für mail2print
#
# Erster Start:
#   Das init-cups-config.sh wird automatisch als "service" (init) ausgeführt
#   und kopiert alle Standard-CUPS-Configs in ./cups/, bevor der echte
#   CUPS-Container hochfährt. Danach läuft alles automatisch.
#
# Secrets in .env ablegen und per ${VAR_NAME} referenzieren.
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Init-Container: kopiert CUPS-Defaultkonfig in ./cups/ (nur einmalig nötig)
  # Startet, kopiert die Configs und beendet sich sofort wieder.
  # ────────────────────────────────────────────────────────────────────────────
  cups-init:
    image: drpsychick/airprint-bridge:latest
    container_name: cups-init
    entrypoint: ["/bin/sh", "/init-cups-config.sh"]
    volumes:
      - ./cups:/etc/cups
      - ./init-cups-config.sh:/init-cups-config.sh:ro
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────
  # CUPS / AirPrint-Bridge
  # Webinterface: http://<host-ip>:631
  # network_mode: host ist notwendig für USB-Drucker und mDNS (Avahi).
  # ────────────────────────────────────────────────────────────────────────────
  cups:
    image: drpsychick/airprint-bridge:latest
    container_name: cups
    restart: unless-stopped
    network_mode: host
    privileged: true
    depends_on:
      cups-init:
        condition: service_completed_successfully
    environment:
      - CUPS_WEBINTERFACE=yes
      - CUPS_REMOTE_ADMIN=yes
      - CUPS_ADMIN_USER=${CUPS_ADMIN_USER:-admin}
      - CUPS_ADMIN_PASSWORD=${CUPS_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./cups:/etc/cups
      - ./avahi:/etc/avahi/services
      - /var/run/dbus:/var/run/dbus

  # ────────────────────────────────────────────────────────────────────────────
  # Avahi – mDNS/Bonjour-Daemon für Druckererkennung im Netzwerk
  # Läuft im host-Netzwerk, damit Multicast-Pakete korrekt weitergeleitet werden.
  # ────────────────────────────────────────────────────────────────────────────
  avahi:
    image: flungo/avahi:latest
    container_name: avahi
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./avahi:/etc/avahi/services
      - /var/run/dbus:/var/run/dbus

  # ────────────────────────────────────────────────────────────────────────────
  # mail2print – E-Mail-zu-Drucker-Dienst
  # WebUI: http://<host-ip>:635
  # network_mode: host erlaubt direkte Kommunikation mit CUPS auf localhost:631.
  # ────────────────────────────────────────────────────────────────────────────
  mail2print:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mail2print
    restart: unless-stopped
    network_mode: host
    depends_on:
      - cups
    environment:
      # ── CUPS-Verbindung ───────────────────────────────────────────────────
      # Bei network_mode: host reicht localhost, da CUPS auf demselben Host läuft.
      - CUPS_SERVER=localhost

      # ── Drucker ──────────────────────────────────────────────────────────
      # Muss exakt dem CUPS-Queue-Namen entsprechen (Groß-/Kleinschreibung!).
      # Prüfen mit:  docker exec mail2print lpstat -p
      - PRINTER_NAME=${PRINTER_NAME:-Your-Printer-Queue-Name}

      # ── IMAP (eingehende Mails) ──────────────────────────────────────────
      - IMAP_SERVER=${IMAP_SERVER:-imap.example.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - EMAIL_ACCOUNT=${EMAIL_ACCOUNT:-print@example.com}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-your-imap-password}

      # ── SMTP (Bestätigungs-Mails) ─────────────────────────────────────────
      - SMTP_SERVER=${SMTP_SERVER:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-print@example.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-your-smtp-password}
      - FROM_ADDRESS=${FROM_ADDRESS:-print@example.com}
      - CONFIRM_SUBJECT=${CONFIRM_SUBJECT:-Dein Druckauftrag wurde verarbeitet}

      # ── Verhalten ─────────────────────────────────────────────────────────
      - SLEEP_TIME=${SLEEP_TIME:-60}
      - ALLOWED_ATTACHMENT_TYPES=${ALLOWED_ATTACHMENT_TYPES:-pdf,docx,png,jpg}
      # Kommaseparierte Absender-Whitelist; leer = alle erlaubt
      - ALLOWED_RECIPIENTS=${ALLOWED_RECIPIENTS:-}
      - CONFIRM_TEMPLATE=${CONFIRM_TEMPLATE:-default.html}

      # ── Admin-Benachrichtigung (optional) ─────────────────────────────────
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}

      # ── WebUI ─────────────────────────────────────────────────────────────
      - WEBUI_ENABLED=${WEBUI_ENABLED:-true}

    volumes:
      - ./mail2print/templates:/app/templates
      - ./mail2print/data:/app/data
      - ./mail2print/logs:/app/logs
