# ══════════════════════════════════════════════════════════════════════════════
# Stack: CUPS + Avahi (AirPrint) + mail2print
#
# Verzeichnisstruktur (wird automatisch angelegt):
#   ./cups/        – CUPS-Konfiguration (/etc/cups im cups-Container)
#   ./avahi/       – Avahi-Service-Dateien (/etc/avahi/services)
#   ./mail2print/  – Daten, Logs und Templates für mail2print
#
# Mail-Templates haben die Endung .j2 (Jinja2), damit der UI-Templateloader
# sie nicht versehentlich als UI-Templates interpretiert.
#
# Secrets in .env ablegen und per ${VAR_NAME} referenzieren.
# ══════════════════════════════════════════════════════════════════════════════

services:

  cups-init:
    image: drpsychick/airprint-bridge:latest
    container_name: cups-init
    entrypoint: ["/bin/sh", "/init-cups-config.sh"]
    volumes:
      - ./cups:/mnt/cups-config
      - ./init-cups-config.sh:/init-cups-config.sh:ro
    restart: "no"

  cups:
    image: drpsychick/airprint-bridge:latest
    container_name: cups
    restart: unless-stopped
    network_mode: host
    privileged: true
    depends_on:
      cups-init:
        condition: service_completed_successfully
    environment:
      - CUPS_WEBINTERFACE=yes
      - CUPS_REMOTE_ADMIN=yes
      - CUPS_ADMIN_USER=${CUPS_ADMIN_USER:-admin}
      - CUPS_ADMIN_PASSWORD=${CUPS_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./cups:/etc/cups
      - ./avahi:/etc/avahi/services
      - /var/run/dbus:/var/run/dbus

  avahi:
    image: flungo/avahi:latest
    container_name: avahi
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./avahi:/etc/avahi/services
      - /var/run/dbus:/var/run/dbus

  mail2print:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mail2print
    restart: unless-stopped
    network_mode: host
    depends_on:
      - cups
    environment:
      - CUPS_SERVER=localhost
      - PRINTER_NAME=${PRINTER_NAME:-Your-Printer-Queue-Name}
      - IMAP_SERVER=${IMAP_SERVER:-imap.example.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - EMAIL_ACCOUNT=${EMAIL_ACCOUNT:-print@example.com}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-your-imap-password}
      - SMTP_SERVER=${SMTP_SERVER:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-print@example.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-your-smtp-password}
      - FROM_ADDRESS=${FROM_ADDRESS:-print@example.com}
      - CONFIRM_SUBJECT=${CONFIRM_SUBJECT:-Dein Druckauftrag wurde verarbeitet}
      - SLEEP_TIME=${SLEEP_TIME:-60}
      - ALLOWED_ATTACHMENT_TYPES=${ALLOWED_ATTACHMENT_TYPES:-pdf,docx,png,jpg}
      - ALLOWED_RECIPIENTS=${ALLOWED_RECIPIENTS:-}
      - CONFIRM_TEMPLATE=${CONFIRM_TEMPLATE:-default_en.j2}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - WEBUI_ENABLED=${WEBUI_ENABLED:-true}

    volumes:
      - ./mail2print/templates:/app/templates
      - ./mail2print/data:/app/data
      - ./mail2print/logs:/app/logs
