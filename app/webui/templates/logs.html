{% extends 'base.html' %}
{% block title %}Live Logs{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4 animate__animated animate__fadeIn">Live Logs</h1>
<p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Real-time log stream from <code class="bg-gray-100 dark:bg-gray-800 px-1 rounded">email2print.log</code></p>

<div class="rounded-2xl overflow-hidden shadow-xl animate__animated animate__fadeInUp">
  <div class="bg-gray-900 px-4 py-2 flex items-center gap-2">
    <span class="w-3 h-3 rounded-full bg-red-500"></span>
    <span class="w-3 h-3 rounded-full bg-yellow-400"></span>
    <span class="w-3 h-3 rounded-full bg-green-400"></span>
    <span class="text-gray-400 text-xs ml-2">email2print.log</span>
    <span id="status-dot" class="ml-auto flex items-center gap-1 text-xs text-green-400">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Live
    </span>
  </div>
  <div id="log-output"
    class="bg-gray-950 text-green-300 font-mono text-xs p-4 h-[65vh] overflow-y-auto whitespace-pre-wrap leading-relaxed">
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const out = document.getElementById('log-output');
  const dot = document.getElementById('status-dot');
  const src = new EventSource('/logs/stream');
  src.onmessage = (e) => {
    const line = document.createElement('div');
    line.textContent = e.data;
    if (e.data.includes('[ERROR]')) line.classList.add('text-red-400');
    else if (e.data.includes('[WARNING]')) line.classList.add('text-yellow-300');
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  };
  src.onerror = () => {
    dot.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-400"></span> Disconnected';
    dot.classList.replace('text-green-400', 'text-red-400');
  };
</script>
{% endblock %}
